<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh}

/* ─── App Shell ─── */
#app{display:flex;flex-direction:column;min-height:calc(100vh - 64px)}

/* ─── App-level header (inside practice) ─── */
.app-header{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-header-left{display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:none;cursor:pointer;color:#64748b;padding:4px 6px;border-radius:6px;display:flex;align-items:center;font-size:13px;gap:4px;font-weight:600}
.back-btn:hover{background:#f1f5f9;color:#0f172a}
.app-header h2{font-size:14px;font-weight:700;color:#0f172a}
.score-correct{color:#16a34a;font-weight:700;font-size:14px}
.score-wrong{color:#ef4444;font-weight:700;font-size:14px}
.score-sep{color:#cbd5e1;font-size:14px}
.progress-bar-wrap{height:3px;background:#e2e8f0;flex-shrink:0}
.progress-bar-fill{height:100%;background:#1d4ed8;transition:width .3s ease}

/* ─── Phases ─── */
.phase{display:none;flex:1;flex-direction:column}
.phase.active{display:flex}

/* ─── Category Select ─── */
.select-phase{align-items:center;justify-content:flex-start;padding:32px 16px}
.select-wrap{width:100%;max-width:400px;margin:0 auto}
.select-title{text-align:center;margin-bottom:28px}
.select-title .icon{font-size:48px;margin-bottom:10px}
.select-title h1{font-size:24px;font-weight:800;color:#0f172a;margin-bottom:6px}
.select-title p{font-size:14px;color:#64748b}
.cat-btn{width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;background:#fff;border:2px solid #e2e8f0;border-radius:14px;cursor:pointer;margin-bottom:10px;transition:all .15s;text-align:left}
.cat-btn:hover{border-color:#1d4ed8;box-shadow:0 2px 12px rgba(29,78,216,.1)}
.cat-btn:active{transform:scale(.98)}
.cat-locked{opacity:.75;cursor:pointer}
.cat-locked:hover{border-color:#94a3b8;box-shadow:none}
.cat-icon{font-size:26px;flex-shrink:0}
.cat-label{font-size:16px;font-weight:700;color:#0f172a}
.cat-sub{font-size:12px;color:#94a3b8;margin-top:2px}

/* ─── Loading ─── */
.loading-phase{align-items:center;justify-content:center;gap:16px;min-height:400px}
.spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#1d4ed8;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Active ─── */
.active-phase{position:relative;overflow:hidden}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 16px;position:relative;overflow:hidden;min-height:450px}
.stack-card{position:absolute;background:#fff;border-radius:20px;border:1px solid #e2e8f0;pointer-events:none}
.stack-card-2{width:calc(100% - 72px);max-width:340px;height:360px;transform:scale(.91) translateY(18px);opacity:.3}
.stack-card-1{width:calc(100% - 40px);max-width:364px;height:360px;transform:scale(.96) translateY(9px);opacity:.5}
.main-card{position:relative;width:100%;max-width:388px;background:#fff;border-radius:20px;border:1px solid #e2e8f0;box-shadow:0 8px 32px rgba(0,0,0,.08);user-select:none;transition:transform .3s ease,opacity .3s ease}
.main-card.dragging{transition:none}
.main-card.fly-right{transform:translateX(130vw) rotate(28deg)!important;opacity:0!important}
.main-card.fly-left{transform:translateX(-130vw) rotate(-28deg)!important;opacity:0!important}

/* Swipe overlays */
.swipe-overlay{position:absolute;inset:0;border-radius:20px;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5}
.swipe-got{border:3px solid #22c55e;background:rgba(240,253,244,.85)}
.swipe-review{border:3px solid #f97316;background:rgba(255,247,237,.85)}
.swipe-badge{font-size:22px;font-weight:900;padding:6px 18px;border-radius:8px;letter-spacing:.05em}
.swipe-got .swipe-badge{color:#15803d;border:3px solid #16a34a;transform:rotate(-12deg)}
.swipe-review .swipe-badge{color:#c2410c;border:3px solid #f97316;transform:rotate(12deg)}

/* Card body */
.card-body{padding:20px 22px 16px}
.card-badges{display:flex;gap:6px;margin-bottom:14px}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
.badge-cat{background:#dbeafe;color:#1d4ed8}
.badge-diff{background:#f1f5f9;color:#64748b}
.card-question{font-size:15px;font-weight:700;color:#0f172a;line-height:1.55;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:7px}
.option-btn{width:100%;display:flex;align-items:center;gap:10px;padding:11px 14px;background:#fff;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;text-align:left;transition:all .15s;min-height:48px}
.option-btn:hover:not(:disabled){border-color:#1d4ed8;background:#eff6ff}
.option-btn:disabled{cursor:default}
.option-btn.opt-correct{border-color:#22c55e;background:#f0fdf4}
.option-btn.opt-wrong{border-color:#ef4444;background:#fef2f2}
.option-btn.opt-dimmed{border-color:#f1f5f9;background:#f8fafc}
.opt-label{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:#f1f5f9;color:#64748b;transition:all .15s}
.option-btn.opt-correct .opt-label{background:#22c55e;color:#fff}
.option-btn.opt-wrong .opt-label{background:#ef4444;color:#fff}
.option-btn.opt-dimmed .opt-label{background:#e2e8f0;color:#94a3b8}
.opt-text{font-size:13px;color:#334155;line-height:1.4}
.option-btn.opt-correct .opt-text{color:#166534;font-weight:600}
.option-btn.opt-wrong .opt-text{color:#991b1b}
.option-btn.opt-dimmed .opt-text{color:#94a3b8}
.result-banner{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:10px;font-size:13px;font-weight:700;margin-top:12px}
.result-banner.rb-pass{background:#dcfce7;color:#166534}
.result-banner.rb-fail{background:#fee2e2;color:#991b1b}
.explanation{font-size:12px;color:#475569;line-height:1.6;margin-top:8px;padding:0 2px}
.card-hint{text-align:center;padding:10px 0 14px;font-size:12px;color:#94a3b8}

/* Bottom bar */
.bottom-bar{flex-shrink:0;background:#fff;border-top:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:12px}
.bottom-hint{font-size:13px;color:#94a3b8}
.btn-review{display:flex;align-items:center;gap:6px;padding:11px 20px;background:#fff7ed;border:2px solid #fed7aa;border-radius:12px;color:#c2410c;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s}
.btn-review:hover{background:#ffedd5}
.btn-next{display:flex;align-items:center;gap:6px;padding:11px 28px;background:#1d4ed8;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s}
.btn-next:hover{background:#1e40af}

/* Done */
.done-phase{align-items:center;justify-content:flex-start;padding:40px 16px}
.done-wrap{width:100%;max-width:380px;margin:0 auto}
.done-score-card{border-radius:20px;padding:32px 24px;text-align:center;color:#fff;margin-bottom:20px}
.done-pass{background:linear-gradient(135deg,#16a34a,#22c55e)}
.done-fail{background:linear-gradient(135deg,#dc2626,#ef4444)}
.done-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.75;margin-bottom:8px}
.done-pct{font-size:72px;font-weight:900;line-height:1}
.done-msg{font-size:20px;font-weight:700;margin-top:8px}
.done-stats{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:14px;opacity:.9}
.done-actions{display:flex;gap:10px}
.done-actions button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-again{background:#1d4ed8;color:#fff}
.btn-again:hover{background:#1e40af}
.btn-back-home{background:#f1f5f9;color:#475569}
.btn-back-home:hover{background:#e2e8f0}

/* Error */
.error-phase{align-items:center;justify-content:center;padding:40px 16px;text-align:center}
.error-card{background:#fff;border:1px solid #fecaca;border-radius:16px;padding:32px 24px;max-width:360px}

@media(max-width:480px){.stack-card-2,.stack-card-1{display:none}.main-card{max-width:100%}}
</style>
