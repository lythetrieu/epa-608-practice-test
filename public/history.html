<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh}
.page{max-width:720px;margin:0 auto;padding:32px 20px 60px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:10px}
.page-header h1{font-size:24px;font-weight:800;color:#0f172a}
.page-sub{font-size:14px;color:#64748b;margin-bottom:28px}

/* ─── Stats ─── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;text-align:center}
.stat-num{font-size:32px;font-weight:900;line-height:1}
.stat-num.blue{color:#1d4ed8}
.stat-num.green{color:#16a34a}
.stat-num.orange{color:#f97316}
.stat-label{font-size:13px;color:#64748b;margin-top:6px}

/* ─── Section heading ─── */
.section-title{font-size:17px;font-weight:700;color:#0f172a;margin:28px 0 12px;display:flex;align-items:center;justify-content:space-between}
.section-title a{font-size:13px;font-weight:600;color:#1d4ed8;text-decoration:none}
.section-title a:hover{text-decoration:underline}

/* ─── Category cards ─── */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.cat-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px}
.cat-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cat-name{font-size:14px;font-weight:700;color:#0f172a}
.cat-pct{font-size:14px;font-weight:800}
.cat-pct.good{color:#16a34a}
.cat-pct.warn{color:#f97316}
.cat-pct.bad{color:#ef4444}
.cat-pct.none{color:#94a3b8}
.prog-bar{height:8px;background:#f1f5f9;border-radius:20px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:20px;transition:width .5s ease}
.prog-fill.good{background:#22c55e}
.prog-fill.warn{background:#f97316}
.prog-fill.bad{background:#ef4444}
.prog-fill.none{background:#e2e8f0;width:0!important}
.cat-meta{font-size:12px;color:#94a3b8}
.cat-actions{display:flex;gap:6px;margin-top:8px}
.cat-act-btn{font-size:11px;padding:4px 10px;border-radius:6px;text-decoration:none;font-weight:600}
.cat-act-btn.blue{background:#eff6ff;color:#1d4ed8}
.cat-act-btn.blue:hover{background:#dbeafe}

/* ─── Session list ─── */
.session-list{display:flex;flex-direction:column;gap:6px}
.session-row{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.session-left{}
.session-cat{font-size:14px;font-weight:600;color:#0f172a}
.session-date{font-size:12px;color:#94a3b8;margin-top:2px}
.session-right{display:flex;align-items:center;gap:8px}
.session-pct{font-size:14px;font-weight:800}
.session-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.session-badge.pass{background:#dcfce7;color:#16a34a}
.session-badge.fail{background:#fee2e2;color:#dc2626}

/* ─── Empty ─── */
.empty-box{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:48px 24px;text-align:center}
.empty-box p{color:#94a3b8;font-size:14px;margin-bottom:16px}
.empty-box a{display:inline-block;padding:10px 24px;background:#1d4ed8;color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px}

/* ─── Clear btn ─── */
.clear-btn{background:none;border:1px solid #fca5a5;color:#ef4444;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.clear-btn:hover{background:#fee2e2}

@media(max-width:480px){.stats-grid{grid-template-columns:repeat(3,1fr)}.cat-grid{grid-template-columns:1fr}}
</style>

.footer-inner {

<body>
<!-- Header -->
<div id="header-placeholder"></div>




<div class="page">
  <div class="page-header">
    <h1>My Progress</h1>
    <button class="clear-btn" onclick="clearHistory()">Clear History</button>
  </div>
  <p class="page-sub">Track your performance across all test categories.</p>

  <!-- Summary stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num blue" id="stat-total">0</div><div class="stat-label">Total Tests</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-avg" style="color:#94a3b8">—</div><div class="stat-label">Avg Score</div></div>
    <div class="stat-card"><div class="stat-num green" id="stat-pass">0</div><div class="stat-label">Tests Passed</div></div>
  </div>

  <!-- By Category -->
  <div class="section-title">By Category</div>
  <div class="cat-grid" id="cat-grid"></div>

  <!-- Session history -->
  <div class="section-title">
    <span>Session History</span>
    <a href="/review.html">Fix My Mistakes →</a>
  </div>
  <div id="session-area"></div>
</div>

<div id="footer-placeholder"></div>
<script src="includes.js"></script>
<script>
var HISTORY_KEY='epa608_history';
var CATS=[
  {key:'Core',label:'Core',icon:'📝',href:'/core.html'},
  {key:'Type I',label:'Type I',icon:'❄️',href:'/type-1.html'},
  {key:'Type II',label:'Type II',icon:'🔧',href:'/type-2.html'},
  {key:'Type III',label:'Type III',icon:'🏭',href:'/type-3.html'},
];

function loadHistory(){
  try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}
  catch(e){return [];}
}

function getColor(pct){
  if(pct===null||pct===undefined)return'none';
  if(pct>=70)return'good';
  if(pct>=50)return'warn';
  return'bad';
}

function fmtDate(d){
  try{
    var dt=new Date(d);
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }catch(e){return d||'';}
}

function render(){
  var history=loadHistory();
  var completed=history.filter(function(h){return h.score!=null;});

  // Stats
  document.getElementById('stat-total').textContent=completed.length;
  if(completed.length){
    var avgPct=Math.round(completed.reduce(function(acc,h){
      return acc+(typeof h.score==='number'?h.score:parseFloat(h.score)||0);
    },0)/completed.length);
    var avg=document.getElementById('stat-avg');
    avg.textContent=avgPct+'%';
    avg.className='stat-num '+(avgPct>=70?'green':'orange');
    document.getElementById('stat-pass').textContent=
      completed.filter(function(h){return (parseFloat(h.score)||0)>=70;}).length;
  }

  // By category
  var bycat={};
  CATS.forEach(function(c){bycat[c.key]={attempts:0,total:0,count:0};});
  completed.forEach(function(h){
    var k=h.category||h.type;
    if(!bycat[k])return;
    bycat[k].total+=(parseFloat(h.score)||0);
    bycat[k].count++;
    bycat[k].attempts++;
  });

  var catHtml='';
  CATS.forEach(function(cat){
    var s=bycat[cat.key];
    var pct=s.count?Math.round(s.total/s.count):null;
    var cl=getColor(pct);
    catHtml+='<div class="cat-card">'
      +'<div class="cat-card-header">'
      +'<span class="cat-name">'+cat.icon+' '+cat.label+'</span>'
      +'<span class="cat-pct '+(cl==='none'?'none':cl)+'">'+( pct!=null?pct+'%':'—')+'</span>'
      +'</div>'
      +'<div class="prog-bar"><div class="prog-fill '+cl+'" style="width:'+(pct||0)+'%"></div></div>'
      +'<div class="cat-meta">'+(s.count?s.count+' attempt'+(s.count!==1?'s':''):'No tests yet')+'</div>'
      +'<div class="cat-actions">'
      +'<a class="cat-act-btn blue" href="'+cat.href+'">Practice</a>'
      +'</div>'
      +'</div>';
  });
  document.getElementById('cat-grid').innerHTML=catHtml;

  // Session list
  var sessionArea=document.getElementById('session-area');
  if(!completed.length){
    sessionArea.innerHTML='<div class="empty-box">'
      +'<p>No completed sessions yet. Take a practice test to see your progress here.</p>'
      +'<a href="/">Start a Test</a>'
      +'</div>';
    return;
  }

  var sorted=completed.slice().reverse();
  var html='<div class="session-list">';
  sorted.forEach(function(h){
    var pct=parseFloat(h.score)||0;
    var pass=pct>=70;
    var cl=pass?'good':'bad';
    html+='<div class="session-row">'
      +'<div class="session-left">'
      +'<div class="session-cat">'+(h.category||h.type||'Practice')+'</div>'
      +'<div class="session-date">'+fmtDate(h.date)+(h.time?' · '+h.time:'')+(h.total?' · '+h.total+' questions':'')+'</div>'
      +'</div>'
      +'<div class="session-right">'
      +'<span class="session-pct" style="color:'+(pass?'#16a34a':'#ef4444')+'">'+Math.round(pct)+'%</span>'
      +'<span class="session-badge '+(pass?'pass':'fail')+'">'+(pass?'Pass':'Fail')+'</span>'
      +'</div></div>';
  });
  html+='</div>';
  sessionArea.innerHTML=html;
}

function clearHistory(){
  if(!confirm('Delete all test history? This cannot be undone.'))return;
  localStorage.removeItem(HISTORY_KEY);
  render();
}

render();
</script>
</body>
