<!-- Header -->
<div id="header-placeholder"></div>




<div class="page">
  <div class="page-header">
    <h1>🎯 Weak Spots</h1>
    <a href="/progress.html" style="font-size:13px;color:#1d4ed8;text-decoration:none;font-weight:600">← My Progress</a>
  </div>
  <p class="page-sub">Subtopics where you struggle most, ranked by error rate.</p>

  <!-- REPORT -->
  <div id="report-wrap">
    <div id="report-loading" class="loading-box">
      <div class="spinner"></div>
      <p style="font-size:14px;color:#64748b">Analyzing your history...</p>
    </div>
    <div id="report-content" style="display:none"></div>
  </div>

</div>

<div id="footer-placeholder"></div>
<script src="includes.js"></script>
<script>
var HISTORY_KEY='epa608History';

var WS=(function(){
  var spots=[];
  var drillCategories=[];

  // ── Analyze localStorage history ──────────────────────────────
  function analyze(){
    var history=[];
    try{history=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){}

    // Collect all wrong questions across all sessions
    var catStats={};  // {category: {wrong:0, total:0}}
    history.forEach(function(h){
      var details=h.detailedResults||[];
      details.forEach(function(d){
        var cat=d.topic||h.category||h.type||'Core';
        if(!catStats[cat])catStats[cat]={wrong:0,total:0};
        catStats[cat].total++;
        if(!d.isCorrect)catStats[cat].wrong++;
      });
    });

    var result=[];
    Object.keys(catStats).forEach(function(cat){
      var s=catStats[cat];
      if(s.total>=2){
        result.push({
          category:cat,
          label:cat,
          errorPct:Math.round(s.wrong/s.total*100),
          wrongCount:s.wrong,
          totalCount:s.total
        });
      }
    });

    // Sort by error rate desc
    result.sort(function(a,b){return b.errorPct-a.errorPct;});
    spots=result;
    return result;
  }

  // ── Render report ──────────────────────────────────────────────
  function renderReport(){
    document.getElementById('report-loading').style.display='none';
    var content=document.getElementById('report-content');
    content.style.display='block';

    if(!spots.length){
      content.innerHTML='<div class="empty-box">'
        +'<div class="empty-icon">📋</div>'
        +'<h3>No weak spots detected yet</h3>'
        +'<p>Take a few practice tests first. We need at least 2 attempts per topic to identify weak areas.</p>'
        +'<a href="/">Start a Practice Test</a>'
        +'</div>';
      return;
    }

    // Categorize by section
    var bySection={'Core':[],'Type I':[],'Type II':[],'Type III':[],'Other':[]};
    spots.forEach(function(s){
      var k=s.category;
      if(!bySection[k])k='Other';
      bySection[k].push(s);
    });

    // Weak categories to drill (error rate > 20% OR any wrong answers)
    var weakCats=spots.filter(function(s){return s.wrongCount>0;}).map(function(s){return s.category;});
    drillCategories=[...new Set(weakCats)].slice(0,3); // top 3 weakest

    var html='';

    ['Core','Type I','Type II','Type III','Other'].forEach(function(sec){
      var items=bySection[sec];
      if(!items||!items.length)return;
      html+='<div class="cat-section"><div class="cat-title">'+sec+'</div>';
      items.forEach(function(s){
        var cl=s.errorPct>50?'high':s.errorPct>=30?'mid':'low';
        html+='<div class="spot-card">'
          +'<div class="spot-header">'
          +'<span class="spot-name">'+s.label+'</span>'
          +'<span class="spot-pct '+cl+'">'+s.errorPct+'% errors</span>'
          +'</div>'
          +'<div class="spot-bar"><div class="spot-bar-fill '+cl+'" style="width:'+s.errorPct+'%"></div></div>'
          +'<div class="spot-meta">'+s.wrongCount+' wrong / '+s.totalCount+' answered</div>'
          +'</div>';
      });
      html+='</div>';
    });


    content.innerHTML=html;
  }

  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  setTimeout(function(){analyze();renderReport();},100);

  return{};
})();
</script>
