<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>AI Study Helper — EPA 608 Tutor</title>
<meta name="description" content="Ask anything about EPA 608. Get instant answers from your AI HVAC instructor.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#0f172a}

/* ─── Hide footer in chat mode ─── */
#footer-placeholder{display:none}

/* ─── Layout: fill viewport below sticky header ─── */
#chat-shell{display:flex;flex-direction:column;height:calc(100vh - 64px);min-height:400px}

/* ─── Chat header ─── */
.chat-header{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-header-left{display:flex;align-items:center;gap:10px}
.bot-icon{width:36px;height:36px;background:#1d4ed8;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.chat-title{font-size:15px;font-weight:700;color:#0f172a;line-height:1.2}
.chat-sub{font-size:12px;color:#64748b}
.chat-header-right{display:flex;align-items:center;gap:6px}
.hdr-btn{background:none;border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:13px;color:#64748b;cursor:pointer;display:flex;align-items:center;gap:4px}
.hdr-btn:hover{background:#f1f5f9}
.limit-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:#eff6ff;color:#1d4ed8}
.limit-badge.hit{background:#fee2e2;color:#dc2626}

/* ─── Messages ─── */
#messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.msg-row{display:flex}
.msg-row.user{justify-content:flex-end}
.msg-row.assistant{justify-content:flex-start}
.bubble{max-width:85%;border-radius:18px;padding:12px 16px;font-size:14px;line-height:1.6}
.bubble.user-bubble{background:#1d4ed8;color:#fff;border-bottom-right-radius:4px}
.bubble.ai-bubble{background:#fff;border:1px solid #e2e8f0;color:#0f172a;border-bottom-left-radius:4px}
.bubble-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;color:#94a3b8}
.bubble-meta svg{color:#1d4ed8}

/* Markdown in AI bubble */
.ai-bubble p{margin-bottom:8px}
.ai-bubble p:last-child{margin-bottom:0}
.ai-bubble strong{font-weight:700}
.ai-bubble em{font-style:italic}
.ai-bubble ul{padding-left:18px;margin-bottom:8px}
.ai-bubble ul li{margin-bottom:4px}
.ai-bubble ol{padding-left:18px;margin-bottom:8px}
.ai-bubble ol li{margin-bottom:4px}
.ai-bubble h3,.ai-bubble h4{font-weight:700;margin:8px 0 4px;color:#0f172a}
.ai-bubble code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px}
.ai-bubble pre{background:#f1f5f9;border-radius:8px;padding:12px;font-size:12px;overflow-x:auto;margin:8px 0}

/* Typing dots */
.typing-dots{display:flex;gap:4px;padding:4px 0}
.typing-dots span{width:8px;height:8px;background:#cbd5e1;border-radius:50%;animation:dot .8s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1);opacity:1}}

/* ─── Empty state ─── */
#empty-state{text-align:center;padding:40px 16px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty-icon{width:56px;height:56px;background:#eff6ff;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#1d4ed8}
.empty-title{font-size:18px;font-weight:800;color:#0f172a;margin-bottom:6px}
.empty-sub{font-size:14px;color:#64748b;margin-bottom:24px}
.suggestions{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px}
.suggestion-btn{width:100%;text-align:left;padding:12px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;font-size:13px;color:#1d4ed8;font-weight:500;cursor:pointer;transition:all .15s;line-height:1.4}
.suggestion-btn:hover{background:#eff6ff;border-color:#1d4ed8}

/* ─── Error banner ─── */
.error-banner{background:#fee2e2;border:1px solid #fecaca;border-radius:12px;padding:10px 14px;font-size:13px;color:#dc2626;text-align:center;margin:0 16px}

/* ─── Input area ─── */
.input-area{flex-shrink:0;background:#fff;border-top:1px solid #e2e8f0;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.input-wrap{display:flex;align-items:flex-end;gap:8px;max-width:760px;margin:0 auto}
#msg-input{flex:1;resize:none;border:1.5px solid #e2e8f0;border-radius:14px;padding:11px 14px;font-size:15px;font-family:inherit;color:#0f172a;background:#f8fafc;outline:none;transition:border-color .15s;max-height:120px;line-height:1.5}
#msg-input:focus{border-color:#1d4ed8;background:#fff}
#msg-input::placeholder{color:#94a3b8}
#send-btn{width:44px;height:44px;background:#1d4ed8;border:none;border-radius:12px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
#send-btn:hover{background:#1e40af}
#send-btn:disabled{opacity:.4;cursor:default}

/* ─── Listening mode ─── */
.listening-ui{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0}
.pulse-dot{width:12px;height:12px;background:#ef4444;border-radius:50%;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.4);opacity:1}}
.stop-btn{padding:9px 18px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}

/* Limit wall */
.limit-wall{padding:14px 0;text-align:center;font-size:13px;color:#64748b}

@media(min-width:768px){#chat-shell{height:calc(100vh - 64px);max-width:800px;margin:0 auto}}
</style>

<script src="includes.js"></script>
<script>
var TUTOR_URL='https://sequvmxgtmbirnixeril.supabase.co/functions/v1/tutor';
var DAILY_KEY='at_remaining';
var DAILY_DATE_KEY='at_date';
var DAILY_LIMIT=5;

var AT=(function(){
  var msgs=[],loading=false,recognition=null;

  /* ── daily limit ── */
  function getRemaining(){
    var today=new Date().toDateString();
    if(localStorage.getItem(DAILY_DATE_KEY)!==today){
      localStorage.setItem(DAILY_DATE_KEY,today);
      localStorage.setItem(DAILY_KEY,String(DAILY_LIMIT));
    }
    var r=parseInt(localStorage.getItem(DAILY_KEY)||String(DAILY_LIMIT),10);
    // Cap stale localStorage from old version (e.g. limit was 30)
    if(r>DAILY_LIMIT){r=DAILY_LIMIT;localStorage.setItem(DAILY_KEY,String(DAILY_LIMIT));}
    return r;
  }
  function useOne(){
    var r=getRemaining();
    if(r<=0)return false;
    localStorage.setItem(DAILY_KEY,String(r-1));
    updateBadge();
    return true;
  }
  function updateBadge(){
    var r=getRemaining();
    var b=document.getElementById('limit-badge');
    b.textContent=r+' left';
    b.className='limit-badge'+(r<=0?' hit':'');
    var wall=document.getElementById('limit-wall');
    var wrap=document.getElementById('input-wrap');
    if(r<=0){wall.style.display='block';wrap.style.display='none';}
    else{wall.style.display='none';wrap.style.display='flex';}
  }

  /* ── render markdown ── */
  function md(text){
    var h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h=h.replace(/```[\w]*\n([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
    h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
    h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
    h=h.replace(/^### (.+)$/gm,'<h4>$1</h4>');
    h=h.replace(/^## (.+)$/gm,'<h3>$1</h3>');
    h=h.replace(/(^- .+$(\n- .+$)*)/gm,function(m){
      var items=m.split('\n').map(function(l){return '<li>'+l.replace(/^- /,'')+'</li>';}).join('');
      return '<ul>'+items+'</ul>';
    });
    h=h.replace(/(^\d+\. .+$(\n\d+\. .+$)*)/gm,function(m){
      var items=m.split('\n').map(function(l){return '<li>'+l.replace(/^\d+\. /,'')+'</li>';}).join('');
      return '<ol>'+items+'</ol>';
    });
    h=h.split(/\n\n+/).map(function(b){
      var t=b.trim();
      if(!t)return '';
      if(/^<(h[3-4]|ul|ol|pre)/.test(t))return t;
      return '<p>'+t.replace(/\n/,'<br>')+'</p>';
    }).join('');
    return h;
  }

  function appendMsg(role,content){
    var messagesEl=document.getElementById('messages');
    var empty=document.getElementById('empty-state');
    if(empty)empty.style.display='none';

    var row=document.createElement('div');
    row.className='msg-row '+role;
    row.id='msg-'+msgs.length;

    if(role==='user'){
      row.innerHTML='<div class="bubble user-bubble">'+esc(content)+'</div>';
    }else{
      row.innerHTML='<div class="bubble ai-bubble">'
        +'<div class="bubble-meta"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2v1h3a2 2 0 012 2v3a2 2 0 01-2 2h-1v2l-3 3-3-3v-2H7a2 2 0 01-2-2V7a2 2 0 012-2h3V4a2 2 0 012-2z"/></svg>AI Study Helper</div>'
        +(content?('<div class="ai-content">'+md(content)+'</div>')
          :'<div class="typing-dots"><span></span><span></span><span></span></div>')
        +'</div>';
    }
    messagesEl.appendChild(row);
    msgs.push({role:role,content:content,el:row});
    scrollBottom();
    return row;
  }

  function updateLastAI(content){
    var last=msgs[msgs.length-1];
    if(!last||last.role!=='assistant')return;
    var bubble=last.el.querySelector('.ai-bubble');
    bubble.innerHTML='<div class="bubble-meta"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2v1h3a2 2 0 012 2v3a2 2 0 01-2 2h-1v2l-3 3-3-3v-2H7a2 2 0 01-2-2V7a2 2 0 012-2h3V4a2 2 0 012-2z"/></svg>AI Study Helper</div>'
      +'<div class="ai-content">'+md(content)+'</div>';
    last.content=content;
    scrollBottom();
  }

  function scrollBottom(){
    var el=document.getElementById('messages');
    el.scrollTop=el.scrollHeight;
  }

  function setError(txt){
    document.getElementById('error-area').innerHTML=txt
      ?'<div class="error-banner">'+esc(txt)+'</div>':'';
  }

  function setLoading(v){
    loading=v;
    document.getElementById('send-btn').disabled=v||!document.getElementById('msg-input').value.trim();
  }

  async function send(){
    var input=document.getElementById('msg-input');
    var text=input.value.trim();
    if(!text||loading)return;
    if(getRemaining()<=0){updateBadge();return;}
    if(!useOne())return;
    setError('');
    // Build history BEFORE appending new user msg
    var history=msgs.slice(-10).map(function(m){return{role:m.role,content:m.content};});
    history.push({role:'user',content:text});

    appendMsg('user',text);
    input.value='';input.style.height='auto';
    document.getElementById('send-btn').disabled=true;
    appendMsg('assistant',''); // typing indicator
    setLoading(true);

    try{
      var res=await fetch(TUTOR_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:history})
      });

      if(!res.ok){
        var e=await res.json().catch(function(){return{};});
        throw new Error(e.error||'Request failed ('+res.status+')');
      }

      // Handle streaming SSE
      var reader=res.body.getReader();
      var decoder=new TextDecoder();
      var buffer='',full='';
      while(true){
        var _ref=await reader.read(),done=_ref.done,value=_ref.value;
        if(done)break;
        buffer+=decoder.decode(value,{stream:true});
        var lines=buffer.split('\n');
        buffer=lines.pop()||'';
        for(var i=0;i<lines.length;i++){
          var line=lines[i];
          if(line.startsWith('data: ')&&line!=='data: [DONE]'){
            try{
              var json=JSON.parse(line.slice(6));
              var chunk=json.choices&&json.choices[0]&&json.choices[0].delta&&json.choices[0].delta.content;
              if(chunk){full+=chunk;updateLastAI(full);}
            }catch(e2){/* skip */}
          }
        }
      }
      if(!full)throw new Error('Empty response from AI');
    }catch(err){
      setError(err.message||'Something went wrong. Try again.');
      // Remove typing bubble
      var last=msgs[msgs.length-1];
      if(last&&last.role==='assistant'&&!last.content){
        last.el.remove();msgs.pop();
      }
    }finally{
      setLoading(false);
    }
  }

  function newChat(){
    msgs=[];
    var messagesEl=document.getElementById('messages');
    messagesEl.innerHTML='';
    // Re-add empty state
    var es=document.createElement('div');
    es.id='empty-state';
    es.innerHTML='<div class="empty-icon"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2v1h3a2 2 0 012 2v3a2 2 0 01-2 2h-1v2l-3 3-3-3v-2H7a2 2 0 01-2-2V7a2 2 0 012-2h3V4a2 2 0 012-2z"/></svg></div>'
      +'<div class="empty-title">Ask me anything about EPA 608</div>'
      +'<div class="empty-sub">Type a question or pick one below</div>'
      +'<div class="suggestions">'
      +'<button class="suggestion-btn" onclick="AT.suggest(this)">What is refrigerant recovery and why is it required?</button>'
      +'<button class="suggestion-btn" onclick="AT.suggest(this)">What\'s the difference between Type I, II, and III certification?</button>'
      +'<button class="suggestion-btn" onclick="AT.suggest(this)">What is the de minimis release rule?</button>'
      +'<button class="suggestion-btn" onclick="AT.suggest(this)">How do I remember pressure-temperature relationships?</button>'
      +'</div>';
    messagesEl.appendChild(es);
    setError('');
  }

  function suggest(btn){
    var input=document.getElementById('msg-input');
    input.value=btn.textContent;
    resize();
    input.focus();
  }

  function keydown(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
  }

  function resize(){
    var ta=document.getElementById('msg-input');
    ta.style.height='auto';
    ta.style.height=Math.min(ta.scrollHeight,120)+'px';
    document.getElementById('send-btn').disabled=!ta.value.trim()||loading||getRemaining()<=0;
  }

  /* ── mic ── */
  function toggleMic(){
    if(recognition&&recognition._active){stopListen();}
    else{startListen();}
  }
  function startListen(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setError('Voice not supported in this browser. Use Chrome.');return;}
    recognition=new SR();
    recognition._active=true;
    recognition.lang='en-US';recognition.interimResults=true;
    recognition.onresult=function(e){
      var t='';
      for(var i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;
      document.getElementById('msg-input').value=t;resize();
    };
    recognition.onend=function(){
      recognition._active=false;
      document.getElementById('listening-ui').style.display='none';
      document.getElementById('input-wrap').style.display='flex';
      var v=document.getElementById('msg-input').value.trim();
      if(v){send();}
    };
    recognition.onerror=function(e){
      recognition._active=false;
      document.getElementById('listening-ui').style.display='none';
      document.getElementById('input-wrap').style.display='flex';
      if(e.error!=='no-speech'&&e.error!=='aborted')setError('Voice error: '+e.error);
    };
    recognition.start();
    document.getElementById('listening-ui').style.display='flex';
    document.getElementById('input-wrap').style.display='none';
  }
  function stopListen(){
    if(recognition)recognition.stop();
    document.getElementById('listening-ui').style.display='none';
    document.getElementById('input-wrap').style.display='flex';
  }

  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  // Init
  updateBadge();
  if(window.SpeechRecognition||window.webkitSpeechRecognition){
    document.getElementById('mic-btn').style.display='flex';
  }

  return{send:send,newChat:newChat,suggest:suggest,keydown:keydown,resize:resize,toggleMic:toggleMic,stopListen:stopListen};
})();
</script>
</body>
</html>
