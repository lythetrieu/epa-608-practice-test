<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get EPA 608 Pro — Lifetime Access | EPA 608 Practice Test</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- No-JS fallback: bounce straight to the auth-first checkout. -->
    <meta http-equiv="refresh" content="0;url=/api/polar/checkout">

    <!-- Warm up the Polar connection so the hosted checkout starts faster -->
    <link rel="preconnect" href="https://polar.sh" crossorigin>
    <link rel="dns-prefetch" href="https://polar.sh">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KJ8X1DQ1GT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-KJ8X1DQ1GT');
        gtag('event', 'begin_checkout', { value: 14.99, currency: 'USD' });
    </script>

    <style>
        :root { --sky:#0369a1; --ink:#0f172a; --muted:#64748b; }
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
               font-family:'DM Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
               background:#f8fafc; color:var(--ink); text-align:center; padding:24px; }
        .card { max-width:420px; }
        .spinner { width:38px; height:38px; margin:0 auto 20px; border:4px solid #e2e8f0;
                   border-top-color:var(--sky); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        h1 { font-size:20px; margin:0 0 8px; }
        p { color:var(--muted); font-size:14.5px; line-height:1.5; margin:0 0 18px; }
        a.btn { display:inline-block; background:var(--sky); color:#fff; text-decoration:none;
                font-weight:700; padding:12px 22px; border-radius:10px; font-size:15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner" aria-hidden="true"></div>
        <h1>Taking you to secure checkout…</h1>
        <p>Redirecting to our payment processor (Polar) to complete your EPA&nbsp;608 Pro purchase.</p>
        <a class="btn" id="go" href="/api/polar/checkout">Continue to checkout →</a>
    </div>
    <script>
        // Auth-first checkout: identifies the logged-in buyer's account so Pro lands
        // on the right person, then forwards to Polar's hosted checkout. Replace()
        // keeps this redirect page out of the back-button history.
        window.location.replace('/api/polar/checkout');
    </script>
</body>
</html>
