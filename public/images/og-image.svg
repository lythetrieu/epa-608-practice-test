<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007acc"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#007acc" opacity="0.06"/>
  <circle cx="150" cy="520" r="160" fill="#0ea5e9" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="80" y="80" width="80" height="6" rx="3" fill="url(#accent)"/>

  <!-- Badge -->
  <rect x="80" y="110" width="180" height="32" rx="16" fill="#007acc" opacity="0.2"/>
  <text x="170" y="131" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle">FREE PRACTICE TEST</text>

  <!-- Main headline -->
  <text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">EPA 608</text>
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Practice Test</text>

  <!-- Subtitle -->
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">Pass your HVAC certification exam on the first try.</text>

  <!-- Divider -->
  <rect x="80" y="405" width="600" height="1" fill="#1e293b"/>

  <!-- Stats row -->
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff">530+</text>
  <text x="80" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#64748b">Questions</text>

  <text x="260" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff">5</text>
  <text x="260" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#64748b">Exam Sections</text>

  <text x="420" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff">100%</text>
  <text x="420" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#64748b">Free</text>

  <!-- Domain -->
  <text x="80" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#475569">epa608practicetest.net</text>

  <!-- Right side visual — exam card -->
  <rect x="820" y="160" width="300" height="320" rx="16" fill="#1e293b" opacity="0.8"/>
  <rect x="820" y="160" width="300" height="6" rx="3" fill="url(#accent)"/>

  <text x="970" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">UNIVERSAL EXAM</text>
  <text x="970" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#e2e8f0" text-anchor="middle">Which refrigerant is used in</text>
  <text x="970" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#e2e8f0" text-anchor="middle">most residential AC systems?</text>

  <!-- Answer options -->
  <rect x="848" y="300" width="244" height="36" rx="8" fill="#0f172a"/>
  <text x="870" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">A. R-22</text>

  <rect x="848" y="344" width="244" height="36" rx="8" fill="#007acc" opacity="0.3"/>
  <rect x="848" y="344" width="4" height="36" rx="2" fill="#007acc"/>
  <text x="870" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#38bdf8">B. R-410A ✓</text>

  <rect x="848" y="388" width="244" height="36" rx="8" fill="#0f172a"/>
  <text x="870" y="411" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">C. R-134a</text>

  <rect x="848" y="432" width="244" height="36" rx="8" fill="#0f172a"/>
  <text x="870" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">D. R-404A</text>
</svg>
