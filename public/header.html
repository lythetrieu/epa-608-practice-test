<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Header ── */
header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 64px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
    gap: 16px;
}

.logo {
    text-decoration: none;
    display: flex;
    align-items: center;
    flex-shrink: 0;
}

.logo img { height: 38px; width: auto; }

/* ── Nav ── */
nav { display: flex; align-items: center; }

.nav-menu {
    display: flex;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 2px;
}

.nav-menu > li { position: relative; }

.nav-menu > li > a {
    display: block;
    padding: 10px 14px;
    color: #374151;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
}

.nav-menu > li > a:hover { background: #f1f5f9; color: #003087; }

/* ── Dropdown ── */
.dropdown { position: relative; }

.dropdown-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 10px 14px;
    color: #374151;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    background: transparent;
    border: none;
    white-space: nowrap;
}

.dropdown-toggle::after {
    content: "▾";
    font-size: 12px;
    opacity: 0.5;
    transition: transform 0.2s;
}

.dropdown.open > .dropdown-toggle {
    background: #f1f5f9;
    color: #003087;
}

.dropdown.open > .dropdown-toggle::after { transform: rotate(180deg); }

/* Dropdown panel — no gap, padding bridges hover area */
.dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    padding-top: 8px; /* hover bridge — do not remove */
    list-style: none;
    display: none;
    z-index: 200;
    min-width: 210px;
}

.dropdown-menu-inner {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid #f1f5f9;
    padding: 6px;
}

.dropdown.open .dropdown-menu { display: block; }

.dropdown-menu li a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    color: #374151;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
}

.dropdown-menu li a:hover { background: #eef3ff; color: #003087; }

.dropdown-menu .divider {
    height: 1px;
    background: #f1f5f9;
    margin: 4px 4px;
}

.dropdown-menu .menu-label {
    padding: 6px 12px 4px;
    font-size: 11px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

/* ── CTA Button ── */
.nav-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    background: #e85d04;
    color: #fff !important;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
}
.nav-cta:hover { background: #c94e02 !important; color: #fff !important; transform: translateY(-1px); }

/* ── Auth buttons ── */
.nav-signin {
    display: inline-flex; align-items: center;
    padding: 8px 14px;
    color: #475569;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
}
.nav-signin:hover { background: #f1f5f9; color: #003087; }
.nav-signup {
    display: inline-flex; align-items: center;
    padding: 8px 16px;
    background: #fff;
    color: #003087 !important;
    border: 1.5px solid #003087;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
}
.nav-signup:hover { background: #003087; color: #fff !important; }
.nav-dashboard {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 8px 16px;
    background: #16a34a;
    color: #fff !important;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
}
.nav-dashboard:hover { background: #15803d !important; }
@media (max-width: 768px) {
    .nav-signin { display: none; }
    .nav-signup, .nav-dashboard { padding: 7px 12px; font-size: 13px; }
}

/* ── Footer ── */
footer {
    background: #0f172a;
    color: #94a3b8;
    padding: 56px 0 32px;
}

.footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

.footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
    gap: 40px;
    margin-bottom: 48px;
}

.footer-brand p {
    font-size: 14px;
    line-height: 1.7;
    color: #64748b;
    margin: 12px 0 20px;
    max-width: 260px;
}

.footer-brand .footer-logo {
    font-size: 16px;
    font-weight: 700;
    color: #f1f5f9;
}

.footer-badge {
    display: inline-block;
    padding: 5px 12px;
    background: rgba(0,48,135,0.15);
    color: #38bdf8;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}

.footer-col h5 {
    font-size: 13px;
    font-weight: 700;
    color: #f1f5f9;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 14px;
}

.footer-col ul { list-style: none; padding: 0; margin: 0; }

.footer-col ul li { margin-bottom: 8px; }

.footer-col ul li a {
    color: #64748b;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.15s;
    line-height: 1.4;
    display: block;
}

.footer-col ul li a:hover { color: #38bdf8; }

.footer-bottom {
    border-top: 1px solid #1e293b;
    padding-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}

.footer-bottom p { font-size: 13px; color: #475569; }

.footer-bottom a { color: #475569; text-decoration: none; font-size: 13px; }
.footer-bottom a:hover { color: #94a3b8; }

/* ── Mobile ── */
@media (max-width: 768px) {
    .header-content { height: 56px; padding: 0 16px; }
    .logo img { height: 32px; }
    .nav-menu > li > a, .dropdown-toggle { padding: 8px 10px; font-size: 13px; }
    .nav-cta { padding: 7px 14px; font-size: 13px; }
    .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    .footer-brand { grid-column: 1 / -1; }
}

@media (max-width: 480px) {
    .nav-menu { gap: 0; }
    .footer-grid { grid-template-columns: 1fr; }
}

.nav-pricing { font-weight: 700; color: #003087 !important; }
.nav-pricing:hover { background: #eef3ff; color: #003087 !important; }
