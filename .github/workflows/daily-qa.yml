name: Daily QA

# Runs the quality system against production every morning, plus on every PR.
# A failure here means a real user is (or is about to be) hurt — each failed
# test ships with video + trace in the run's artifact.
#
# SECURITY NOTE: this repository is PUBLIC. The service-role key is only handed
# to the scheduled/manual runs. Pull requests deliberately run WITHOUT it, so a
# PR can never execute code that reads the key. Data-layer specs skip in that
# mode; the schedule still covers them daily.

on:
  schedule:
    - cron: '0 1 * * *' # 01:00 UTC = 08:00 Vietnam — the one that files the report
    - cron: '0 4,7,10,13,16,19,22 * * *' # every 3h in between, to catch regressions early
  push:
    branches: [main] # a bad merge should not wait for the next slot
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target to test (defaults to production)'
        required: false
        default: 'https://app.epa608practicetest.net'

concurrency:
  # Keyed by event too: a 3-hourly cron and a push to main share a ref, and
  # without this they would cancel each other and report a false "cancelled".
  group: daily-qa-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write # so a failing canary can raise/refresh one tracking issue

env:
  E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://app.epa608practicetest.net' }}

jobs:
  static:
    name: Types · Lint · Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint --if-present

      - name: Dependency vulnerabilities (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  # The journey specs drive a real quiz, and the questions come back in a random
  # order — so a format the driver mishandles (SELECT-ALL, numeric entry) only
  # surfaces on the runs where it happens to land first. One pass a day found
  # that class of bug roughly once a week; five passes finds it the same morning.
  soak:
    name: Journey soak (randomised, 5 passes)
    # Not on push/PR — five replays is too slow to gate a merge on.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Replay the user journey five times
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx playwright test 07-user-journey --project=desktop --repeat-each=5 --workers=3
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: soak-${{ github.run_number }}
          path: |
            tests/e2e/videos
            tests/e2e/.artifacts
          retention-days: 14
          if-no-files-found: ignore

  e2e:
    name: Function · Security · Data · A11y · Content
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci

      - name: Install browsers (Chromium + WebKit for iOS Safari)
        run: npx playwright install --with-deps chromium webkit

      - name: Run the quality suite
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # withheld on pull_request — see SECURITY NOTE above
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event_name == 'pull_request' && '' || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_WORKERS: '3'
        run: npx playwright test

      # Readable result on the run page itself — no download needed.
      - name: Write summary
        if: always()
        run: node tests/e2e/summarize.js --md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report (video + trace for every failure)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: qa-report-${{ github.run_number }}
          path: |
            tests/e2e/report
            tests/e2e/videos
            tests/e2e/.artifacts
          retention-days: 14
          if-no-files-found: ignore

      # One living issue for the canary, refreshed each failure, closed when green.
      - name: Raise / refresh the canary issue
        if: always() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const failed = '${{ job.status }}' === 'failure'
            const title = '🔴 Daily QA is failing'
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'qa-canary',
            })
            const existing = open.find(i => i.title === title)
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            if (!failed) {
              if (existing) {
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number, body: `✅ Back to green — ${runUrl}` })
                await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number, state: 'closed' })
              }
              return
            }

            let summary = '_summary unavailable_'
            try { summary = require('child_process').execSync('node tests/e2e/summarize.js --md').toString() } catch {}
            const body = `${summary}\n\n[Full run, with video + trace →](${runUrl})`

            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body })
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['qa-canary'] })
            }
